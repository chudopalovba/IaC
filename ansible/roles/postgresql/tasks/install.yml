---
- name: Установка пакетов PostgreSQL
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2 
      - acl 
    state: present
    update_cache: yes

- name: Убеждаемся, что PostgreSQL запущен и включен в автозагрузку
  service:
    name: postgresql
    state: started
    enabled: yes